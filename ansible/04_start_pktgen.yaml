---
- name: Start pktgen on sender nodes
  hosts: targets
  become: true

  vars:
    pktgen_bin: /home/telmat/pktgen-dpdk/builddir/app/pktgen
    pktgen_session: pktgen
    pktgen_setup:
      "10.90.1.1":
        pkt_file: /home/ansible/node1_send.pkt
        pktgen_args: "-- -T -P -m [1-3:4-6].0 -m [7-9:10-12].1"
      "10.90.1.4":
        pkt_file: /home/ansible/node4_send.pkt
        pktgen_args: "-- -T -P -m [1-3:4-6].0"

  tasks:
    # --- Launch pktgen ---
    - name: Kill existing pktgen tmux session if present
      ansible.builtin.shell: tmux kill-session -t {{ pktgen_session }}
      failed_when: false
      when: inventory_hostname in pktgen_setup

    - name: Launch pktgen in detached tmux session
      ansible.builtin.shell: >
        tmux new-session -d -s {{ pktgen_session }}
        '{{ pktgen_bin }} {{ pktgen_setup[inventory_hostname].pktgen_args }}
        -f {{ pktgen_setup[inventory_hostname].pkt_file }}'
      when: inventory_hostname in pktgen_setup

    - name: Wait for pktgen to initialize
      ansible.builtin.pause:
        seconds: 5
      run_once: true

    # --- Start traffic ---
    - name: Wait for user to start traffic
      ansible.builtin.pause:
        prompt: |
          ============================================================
          Pktgen is running on all sender nodes.
          Press ENTER to start sending traffic (start 0)...
          ============================================================
      run_once: true

    - name: Start traffic (start 0)
      ansible.builtin.shell: tmux send-keys -t {{ pktgen_session }} "start 0" Enter
      when: inventory_hostname in pktgen_setup

    # --- Stop traffic ---
    - name: Wait for user to stop traffic
      ansible.builtin.pause:
        prompt: |
          ============================================================
          Traffic is running on all sender nodes.
          Press ENTER to stop traffic and quit pktgen...
          ============================================================
      run_once: true

    - name: Stop traffic (stop 0)
      ansible.builtin.shell: tmux send-keys -t {{ pktgen_session }} "stop 0" Enter
      when: inventory_hostname in pktgen_setup

    - name: Quit pktgen
      ansible.builtin.shell: tmux send-keys -t {{ pktgen_session }} "quit" Enter
      when: inventory_hostname in pktgen_setup
